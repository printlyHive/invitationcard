<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrintlyHive Design Studio for Customers</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pacifico&family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .pattern-grid {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* Graphic Drag Styling */
        .draggable-graphic { cursor: grab; position: absolute; transform-origin: center; user-select: none; }
        .draggable-graphic:active { cursor: grabbing; }
        .draggable-graphic img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex flex-col md:flex-row h-[100dvh] overflow-hidden">

    <!-- LEFT PANEL: Editor (Bottom on Mobile, Left on PC) -->
    <div class="w-full md:w-[400px] bg-white border-r border-gray-200 shadow-xl overflow-y-auto z-20 flex flex-col h-[55dvh] md:h-screen order-2 md:order-1">
        
        <div class="p-5 md:p-6 bg-slate-900 text-white flex-shrink-0">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">✨ PrintlyHive Design Studio</h1>
            <p class="text-xs md:text-sm text-slate-300 mt-1">Etsy Digital Download Creator</p>
        </div>

        <div class="flex-1 p-5 md:p-6 space-y-8 overflow-y-auto" id="editor-forms">
            
            <!-- Design Settings -->
            <section class="space-y-4">
                <h2 class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 border-b pb-2">1. Design Settings</h2>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Occasion</label>
                    <div id="occasion-container">
                        <select id="input-occasion" class="w-full p-2.5 text-base bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Theme Style</label>
                    <div id="theme-buttons" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Color Palette</label>
                    <div id="palette-buttons" class="flex flex-wrap gap-3"></div>
                </div>
            </section>

            <!-- Text Content -->
            <section class="space-y-4">
                <h2 class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 border-b pb-2">2. Card Details</h2>
                <div id="text-inputs-container" class="space-y-4">
                    <!-- Text inputs injected by JS -->
                </div>
            </section>

            <!-- Custom Graphics Engine -->
            <section class="space-y-4">
                <h2 class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 border-b pb-2">3. Custom Graphics</h2>
                
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <p class="text-xs text-gray-500 mb-3">Add photos or emojis. Drag them on the card to move!</p>
                    
                    <div class="flex gap-2 mb-4">
                        <label class="flex-1 bg-white border border-gray-300 text-gray-700 text-sm font-bold py-2 px-3 rounded-lg text-center cursor-pointer hover:bg-gray-50 transition-colors">
                            <span>📷 Upload Photo</span>
                            <input type="file" id="photo-upload" accept="image/*" class="hidden">
                        </label>
                    </div>

                    <div class="grid grid-cols-6 gap-2 mb-4 text-2xl text-center cursor-pointer select-none" id="emoji-picker">
                        <div class="hover:scale-125 transition-transform" onclick="addGraphic('emoji', '🎂')">🎂</div>
                        <div class="hover:scale-125 transition-transform" onclick="addGraphic('emoji', '🎈')">🎈</div>
                        <div class="hover:scale-125 transition-transform" onclick="addGraphic('emoji', '👶')">👶</div>
                        <div class="hover:scale-125 transition-transform" onclick="addGraphic('emoji', '🧸')">🧸</div>
                        <div class="hover:scale-125 transition-transform" onclick="addGraphic('emoji', '💍')">💍</div>
                        <div class="hover:scale-125 transition-transform" onclick="addGraphic('emoji', '🥂')">🥂</div>
                    </div>

                    <div id="active-graphics-list" class="space-y-2 mt-4 empty:hidden">
                        <!-- Graphic management rows injected here -->
                    </div>
                </div>
            </section>
        </div>

        <!-- Download Action -->
        <div class="p-4 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex-shrink-0">
            <button id="download-btn" class="w-full py-3 px-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-2 transition-all bg-blue-600 hover:bg-blue-700 hover:shadow-lg">
                <svg id="icon-download" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <svg id="icon-loading" class="animate-spin hidden h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span id="download-text">Download Design</span>
            </button>
            <p class="text-center text-xs text-gray-500 mt-2">Downloads a high-res PNG file</p>
        </div>
    </div>

    <!-- RIGHT PANEL: Live Preview Area (Top on Mobile, Right on PC) -->
    <div id="preview-area" class="flex-1 overflow-hidden flex items-center justify-center relative bg-[#f0f2f5] p-0 md:p-12 pattern-grid h-[45dvh] md:h-screen order-1 md:order-2">
        
        <!-- Helper Tooltip -->
        <div class="absolute top-2 md:top-6 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-full shadow-sm border border-gray-200 text-xs md:text-sm text-gray-500 flex items-center gap-2 z-10">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            Live Preview
        </div>

        <!-- Transform Scale Wrapper for perfect fitting -->
        <div id="scale-wrapper" class="transition-transform duration-200 origin-center flex items-center justify-center">
            
            <!-- Card Wrapper (Fixed at 500x700 pixels mathematically) -->
            <div class="w-[500px] h-[700px] shadow-2xl flex-shrink-0 relative bg-white overflow-hidden">
                
                <!-- Actual Card Content -->
                <div id="invitation-card-capture" class="relative w-full h-full overflow-hidden flex flex-col items-center text-center transition-colors duration-500 bg-white">
                    
                    <!-- Background Decorations -->
                    <div id="preview-decorations" class="absolute inset-0 pointer-events-none z-0"></div>
                    
                    <!-- Interactive Graphics Container -->
                    <div id="canvas-elements" class="absolute inset-0 z-10 pointer-events-auto overflow-hidden"></div>

                    <!-- Typography Content Wrapper (Flex-Grow Spring Layout) -->
                    <div class="relative z-20 flex flex-col items-center justify-between h-full w-full py-8 pointer-events-none">
                        
                        <!-- Header Section -->
                        <div class="flex flex-col items-center gap-2 mt-10">
                            <p id="preview-hostText" class="text-sm tracking-widest uppercase opacity-80"></p>
                            <h2 id="preview-title" class="text-5xl my-0 leading-tight px-4"></h2>
                            <p id="preview-subtitle" class="text-sm tracking-[0.2em] uppercase opacity-70 mt-4"></p>
                        </div>

                        <!-- Main Subject Section (Spring) -->
                        <div class="flex-grow flex items-center justify-center w-full relative">
                            <h1 id="preview-name" class="text-6xl font-bold leading-tight px-6 drop-shadow-sm mb-8"></h1>
                        </div>

                        <!-- Event Details Section -->
                        <div class="flex flex-col items-center justify-end w-full px-8 pb-16 relative">
                            <div class="flex flex-col items-center gap-1 w-full border-t border-b py-3 mb-4" id="preview-date-divider">
                                <p id="preview-date" class="font-semibold text-lg tracking-wide uppercase"></p>
                                <p id="preview-time" class="text-base opacity-80"></p>
                            </div>

                            <div id="preview-location" class="whitespace-pre-line text-base opacity-90 leading-relaxed font-medium"></div>
                            <div id="preview-rsvp" class="whitespace-pre-line text-sm mt-2 opacity-90 font-bold"></div>
                            
                            <!-- Registry Pill -->
                            <div id="preview-registry-container" class="mt-4 bg-white/80 px-5 py-2 rounded-full shadow-sm mb-6 inline-block">
                                <div id="preview-registry" class="text-xs tracking-widest uppercase opacity-90 font-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & CONFIGURATION ---
        const OCCASIONS = ["Baby Shower", "Birthday", "Wedding", "Bridal Shower", "Graduation"];
        
        const POPULAR_FONTS = [
            { label: "Theme Default", value: "default" },
            { label: "Playfair (Serif)", value: "'Playfair Display', serif" },
            { label: "Cinzel (Serif)", value: "'Cinzel', serif" },
            { label: "Great Vibes (Script)", value: "'Great Vibes', cursive" },
            { label: "Pacifico (Script)", value: "'Pacifico', cursive" },
            { label: "Dancing Script", value: "'Dancing Script', cursive" },
            { label: "Montserrat (Sans)", value: "'Montserrat', sans-serif" }
        ];

        const FONT_SIZES = [
            { label: "Tiny", value: "0.6em" },
            { label: "Small", value: "0.8em" },
            { label: "Normal", value: "1em" },
            { label: "Large", value: "1.2em" },
            { label: "X-Large", value: "1.4em" },
            { label: "Huge", value: "1.6em" }
        ];

        const COLOR_PALETTES = {
            "Safari Jungle": [
                { name: "Jungle Green", primary: "#2c5e3b", secondary: "#e8c972", text: "#333333", bg: "#fdfbf7" },
                { name: "Sunset Savannah", primary: "#d35400", secondary: "#f39c12", text: "#4a3b32", bg: "#fffaf0" },
                { name: "Neutral Earth", primary: "#7f8c8d", secondary: "#bdc3c7", text: "#2c3e50", bg: "#f4f6f7" }
            ],
            "Boho Floral": [
                { name: "Rose Gold", primary: "#b76e79", secondary: "#e0bfb8", text: "#4a4a4a", bg: "#fffafb" },
                { name: "Dusty Blue", primary: "#6b8e23", secondary: "#a0b2c6", text: "#2c3e50", bg: "#f0f8ff" },
                { name: "Lavender", primary: "#8e44ad", secondary: "#d2b4de", text: "#342244", bg: "#faf5ff" }
            ],
            "Modern Minimalist": [
                { name: "Classic Noir", primary: "#222222", secondary: "#888888", text: "#111111", bg: "#ffffff" },
                { name: "Navy & Gold", primary: "#2c3e50", secondary: "#d4af37", text: "#1a252f", bg: "#f8f9fa" },
                { name: "Terracotta", primary: "#e07a5f", secondary: "#f4f1de", text: "#3d405b", bg: "#faf9f6" }
            ],
            "Cosmic Space": [
                { name: "Deep Navy", primary: "#1a2a6c", secondary: "#b21f1f", text: "#ffffff", bg: "#0f172a" },
                { name: "Purple Nebula", primary: "#4b1248", secondary: "#f0c27b", text: "#fdfdfd", bg: "#1e1b4b" },
                { name: "Starlight Blue", primary: "#00c6ff", secondary: "#0072ff", text: "#f0f8ff", bg: "#000b18" }
            ],
            "Ocean Under Sea": [
                { name: "Coral Reef", primary: "#ff7f50", secondary: "#20b2aa", text: "#004d40", bg: "#e0f7fa" },
                { name: "Deep Blue", primary: "#01579b", secondary: "#4fc3f7", text: "#ffffff", bg: "#001f3f" },
                { name: "Sandy Beach", primary: "#00838f", secondary: "#ffb300", text: "#3e2723", bg: "#fff3e0" }
            ],
            "Rustic Winter": [
                { name: "Frosty Pine", primary: "#2e4a3d", secondary: "#8ba8a0", text: "#1a2a22", bg: "#f0f5f3" },
                { name: "Midnight Snow", primary: "#1c2833", secondary: "#85c1e9", text: "#fdfefe", bg: "#154360" },
                { name: "Berry & Wood", primary: "#641e16", secondary: "#d4ac0d", text: "#3e2723", bg: "#fdf7e3" }
            ],
            "Vintage Art Deco": [
                { name: "Gatsby Gold", primary: "#ffffff", secondary: "#d4af37", text: "#f8f9fa", bg: "#111111" },
                { name: "Emerald Glitz", primary: "#0e6251", secondary: "#f1c40f", text: "#183028", bg: "#e9f7ef" },
                { name: "Pearl Deco", primary: "#2c3e50", secondary: "#b7950b", text: "#1a252f", bg: "#fdfbf7" }
            ]
        };

        const THEMES = {
            "Safari Jungle": {
                fontTitle: "'Great Vibes', cursive", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute top-0 left-0 w-full flex justify-between px-4 pt-2 text-6xl opacity-80" style="color:${c.primary}">
                        <span class="transform -scale-x-100 rotate-12">🌿</span>
                        <span class="transform -translate-y-4">🍃</span>
                        <span class="rotate-12">🌿</span>
                    </div>
                    <div class="absolute bottom-10 left-4 text-5xl transform -scale-x-100 rotate-6 drop-shadow-md z-0">🦁</div>
                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 text-6xl transform scale-x-100 -rotate-6 drop-shadow-md z-0">🐘</div>
                    <div class="absolute bottom-10 right-4 text-7xl transform -translate-y-2 drop-shadow-md z-0">🦒</div>
                    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(${c.primary} 1px, transparent 1px); background-size: 20px 20px;"></div>
                `
            },
            "Ocean Under Sea": {
                fontTitle: "'Pacifico', cursive", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute top-10 left-10 text-3xl opacity-60 animate-pulse">🫧</div>
                    <div class="absolute top-32 right-12 text-4xl opacity-50">🫧</div>
                    <div class="absolute bottom-40 left-8 text-2xl opacity-70">🫧</div>
                    <div class="absolute top-4 right-4 text-6xl opacity-80 transform -rotate-12">🐠</div>
                    <div class="absolute top-1/2 left-2 text-5xl opacity-40 transform rotate-45">🐢</div>
                    <div class="absolute bottom-6 w-full flex justify-center items-end gap-6 z-0">
                      <span class="text-6xl transform scale-x-100 rotate-12 drop-shadow-md translate-y-2">🦀</span>
                      <span class="text-7xl transform drop-shadow-md translate-y-3">🐙</span>
                      <span class="text-5xl transform -scale-x-100 -rotate-12 drop-shadow-md translate-y-2">🐡</span>
                    </div>
                    <div class="absolute bottom-2 left-0 text-6xl opacity-60 transform -rotate-12 translate-y-2">🌿</div>
                    <div class="absolute bottom-2 right-0 text-6xl opacity-60 transform scale-x-100 rotate-12 translate-y-2">🌿</div>
                `
            },
            "Boho Floral": {
                fontTitle: "'Playfair Display', serif", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute -top-4 -left-4 text-8xl opacity-90 drop-shadow-sm transform -rotate-45">🌸</div>
                    <div class="absolute top-8 -left-2 text-6xl opacity-80 drop-shadow-sm transform rotate-12">🌺</div>
                    <div class="absolute -bottom-4 -right-4 text-8xl opacity-90 drop-shadow-sm transform rotate-135">🌸</div>
                    <div class="absolute bottom-8 -right-2 text-6xl opacity-80 drop-shadow-sm transform -rotate-12">🌺</div>
                    <div class="absolute inset-4 border rounded-lg opacity-30" style="border-color:${c.primary}"></div>
                `
            },
            "Modern Minimalist": {
                fontTitle: "'Montserrat', sans-serif", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute top-0 right-0 w-32 h-32 rounded-bl-full opacity-20" style="background-color:${c.primary}"></div>
                    <div class="absolute bottom-0 left-0 w-48 h-48 rounded-tr-full opacity-20" style="background-color:${c.secondary}"></div>
                    <div class="absolute top-1/2 left-4 w-1 h-32 transform -translate-y-1/2 opacity-30" style="background-color:${c.primary}"></div>
                `
            },
            "Cosmic Space": {
                fontTitle: "'Playfair Display', serif", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute inset-0 opacity-10" style="background-color:${c.secondary}"></div>
                    <div class="absolute top-8 left-8 text-4xl opacity-80 animate-pulse">✨</div>
                    <div class="absolute bottom-24 left-10 text-2xl opacity-70">🌟</div>
                    <div class="absolute top-32 left-4 text-6xl opacity-90 transform -rotate-12">🌙</div>
                    <div class="absolute bottom-12 right-8 text-7xl opacity-90 transform rotate-12">🚀</div>
                `
            },
            "Rustic Winter": {
                fontTitle: "'Playfair Display', serif", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute inset-5 border-2 border-opacity-40" style="border-color:${c.primary}"></div>
                    <div class="absolute top-8 left-8 text-4xl opacity-60">❄️</div>
                    <div class="absolute bottom-1/4 right-6 text-4xl opacity-40">❄️</div>
                    <div class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-2 text-6xl opacity-80">🦌</div>
                    <div class="absolute bottom-8 left-4 text-6xl opacity-70">🌲</div>
                    <div class="absolute bottom-8 right-4 text-5xl opacity-70">🌲</div>
                `
            },
            "Vintage Art Deco": {
                fontTitle: "'Cinzel', serif", fontBody: "'Montserrat', sans-serif",
                decorations: (c) => `
                    <div class="absolute inset-4 border-2 opacity-80" style="border-color:${c.secondary}"></div>
                    <div class="absolute top-4 left-4 w-12 h-12 border-t-4 border-l-4 opacity-80" style="border-color:${c.secondary}"></div>
                    <div class="absolute bottom-4 right-4 w-12 h-12 border-b-4 border-r-4 opacity-80" style="border-color:${c.secondary}"></div>
                    <div class="absolute inset-0 opacity-[0.02]" style="background-image: repeating-linear-gradient(45deg, ${c.secondary} 0, ${c.secondary} 1px, transparent 0, transparent 50%); background-size: 10px 10px;"></div>
                `
            }
        };

        const INPUT_FIELDS = [
            { label: "Host / Intro Line", name: "hostText", type: "text" },
            { label: "Main Event Title", name: "title", type: "text" },
            { label: "Subtitle", name: "subtitle", type: "text" },
            { label: "Honoree Name", name: "name", type: "text" },
            { label: "Date", name: "date", type: "text" },
            { label: "Time", name: "time", type: "text" },
            { label: "Location / Address", name: "location", type: "textarea" },
            { label: "RSVP Info", name: "rsvp", type: "textarea" },
            { label: "Additional Info (Registry)", name: "registry", type: "text" }
        ];

        // --- GLOBAL APP STATE ---
        let state = {
            occasion: "Baby Shower",
            theme: "Safari Jungle",
            paletteIndex: 0,
            isLocked: false,
            content: {
                hostText: "Please join us for a",
                title: "Baby Shower",
                subtitle: "honoring",
                name: "Leo Alexander",
                date: "Saturday, October 24th, 2026",
                time: "At Two O'Clock in the Afternoon",
                location: "The Botanical Gardens\n123 Safari Way, Jungle City, OR",
                rsvp: "RSVP to Sarah by October 10th\n(555) 123-4567",
                registry: "Registered at Target & Amazon"
            },
            styles: {}, // Custom fonts and sizes per field
            graphics: [] // Custom emojis/photos
        };

        // --- STREAMING_CHUNK:Rendering Engine ---
        function renderPreview() {
            try {
                const palette = COLOR_PALETTES[state.theme][state.paletteIndex];
                const themeDef = THEMES[state.theme];
                const card = document.getElementById('invitation-card-capture');

                // 1. Base Colors
                card.style.backgroundColor = palette.bg;
                card.style.color = palette.text;
                document.getElementById('preview-title').style.color = palette.primary;
                document.getElementById('preview-name').style.color = palette.secondary;
                document.getElementById('preview-date-divider').style.borderColor = palette.primary + '40';
                document.getElementById('preview-rsvp').style.color = palette.primary;
                document.getElementById('preview-registry').style.color = palette.text;

                // 2. Theme Decorations
                document.getElementById('preview-decorations').innerHTML = themeDef.decorations(palette);

                // 3. Text Content & Typography
                INPUT_FIELDS.forEach(field => {
                    const el = document.getElementById('preview-' + field.name);
                    if(!el) return;
                    
                    // Container toggle logic
                    if(field.name === 'registry') {
                        document.getElementById('preview-registry-container').style.display = state.content.registry ? 'inline-block' : 'none';
                    }

                    // Apply Styles
                    const isTitle = ['title', 'name'].includes(field.name);
                    const defaultFont = isTitle ? themeDef.fontTitle : themeDef.fontBody;
                    const customStyle = state.styles[field.name] || {};
                    
                    el.style.fontFamily = (customStyle.font && customStyle.font !== 'default') ? customStyle.font : defaultFont;
                    
                    // Special rule for Boho/Safari name field
                    if(field.name === 'name' && (!customStyle.font || customStyle.font === 'default')) {
                        if(state.theme === 'Boho Floral' || state.theme === 'Safari Jungle') {
                            el.style.fontFamily = "'Great Vibes', cursive";
                        }
                    }

                    // Wrap text in a span for relative em-sizing, so it respects the gorgeous base sizes!
                    const size = customStyle.size || '1em';
                    el.innerHTML = ''; // Clear previous
                    const span = document.createElement('span');
                    span.style.fontSize = size;
                    span.innerText = state.content[field.name];
                    el.appendChild(span);
                });

                renderGraphics();
            } catch (err) {
                console.error("Render Error:", err);
            }
        }

        // --- STREAMING_CHUNK:Graphics Engine (Drag & Drop) ---
        function addGraphic(type, src) {
            state.graphics.push({
                id: Date.now(),
                type: type,
                src: src,
                x: 200, y: 300, size: 80
            });
            renderGraphics();
            updateGraphicsList();
        }

        function removeGraphic(id) {
            state.graphics = state.graphics.filter(g => g.id !== id);
            renderGraphics();
            updateGraphicsList();
        }

        function renderGraphics() {
            const container = document.getElementById('canvas-elements');
            container.innerHTML = '';
            
            state.graphics.forEach(g => {
                const el = document.createElement('div');
                el.className = 'draggable-graphic pointer-events-auto';
                el.style.left = g.x + 'px';
                el.style.top = g.y + 'px';
                el.style.fontSize = g.size + 'px';
                el.style.width = (g.type === 'image' ? g.size : 'auto') + 'px';
                el.style.height = (g.type === 'image' ? g.size : 'auto') + 'px';
                
                if(g.type === 'emoji') {
                    el.innerText = g.src;
                } else {
                    const img = document.createElement('img');
                    img.src = g.src;
                    el.appendChild(img);
                }

                // Drag Events
                let isDragging = false, startX, startY;
                el.onmousedown = el.ontouchstart = (e) => {
                    isDragging = true;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    startX = clientX - g.x;
                    startY = clientY - g.y;
                    e.preventDefault();
                };
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, {passive: false});
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);

                function drag(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    // Card is exactly 500x700 mathematically, we need to factor the CSS transform scale
                    const wrapper = document.getElementById('scale-wrapper');
                    const scale = wrapper.style.transform ? parseFloat(wrapper.style.transform.replace(/[^\d.]/g, '')) : 1;
                    
                    g.x = (clientX - startX) / scale;
                    g.y = (clientY - startY) / scale;
                    el.style.left = g.x + 'px';
                    el.style.top = g.y + 'px';
                }

                function stopDrag() {
                    isDragging = false;
                }

                container.appendChild(el);
            });
        }

        function updateGraphicsList() {
            const list = document.getElementById('active-graphics-list');
            list.innerHTML = '';
            state.graphics.forEach(g => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-2 bg-white p-2 border rounded shadow-sm text-sm";
                row.innerHTML = `
                    <span class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded overflow-hidden">
                        ${g.type === 'emoji' ? g.src : '<img src="'+g.src+'" class="w-full h-full object-cover">'}
                    </span>
                    <input type="range" min="20" max="300" value="${g.size}" class="flex-1" oninput="updateGraphicSize(${g.id}, this.value)">
                    <button class="text-red-500 hover:bg-red-50 p-1 rounded" onclick="removeGraphic(${g.id})">🗑️</button>
                `;
                list.appendChild(row);
            });
        }

        function updateGraphicSize(id, val) {
            const graphic = state.graphics.find(g => g.id === id);
            if(graphic) graphic.size = parseInt(val);
            renderGraphics();
        }

        // --- STREAMING_CHUNK:UI Initialization ---
        function initUI() {
            // Smart URL Occasion Lock
            const params = new URLSearchParams(window.location.search);
            const urlOccasion = params.get('occasion');
            if (urlOccasion && OCCASIONS.includes(urlOccasion)) {
                state.occasion = urlOccasion;
                state.isLocked = true;
                state.content.title = urlOccasion;
                
                document.getElementById('occasion-container').innerHTML = `
                    <div class="w-full p-2.5 bg-gray-100 border border-gray-200 rounded-lg text-gray-500 flex items-center justify-between cursor-not-allowed">
                        <span>${urlOccasion}</span>
                        <span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded flex items-center gap-1">Locked</span>
                    </div>`;
            } else {
                const select = document.getElementById('input-occasion');
                select.innerHTML = ''; // FIX: Clear existing options before adding to prevent duplicates
                OCCASIONS.forEach(occ => select.add(new Option(occ, occ)));
                select.value = state.occasion;
                select.onchange = (e) => {
                    state.occasion = e.target.value;
                    state.content.title = e.target.value;
                    buildTextInputs(); // Rebuild to show new title
                    renderPreview();
                };
            }

            // Theme Buttons
            const themeContainer = document.getElementById('theme-buttons');
            themeContainer.innerHTML = ''; // FIX: Clear existing buttons before adding to prevent duplicates
            
            Object.keys(THEMES).forEach(t => {
                const btn = document.createElement('button');
                btn.innerText = t;
                btn.className = `py-2 px-3 text-sm rounded-lg border text-center transition-all ${state.theme === t ? 'bg-blue-50 border-blue-500 text-blue-700 font-bold' : 'bg-white text-gray-600 hover:bg-gray-50'}`;
                btn.onclick = () => {
                    state.theme = t;
                    state.paletteIndex = 0; // Reset palette
                    initUI(); // Re-render UI to update palettes
                    renderPreview();
                };
                themeContainer.appendChild(btn);
            });

            // Palette Buttons
            const palContainer = document.getElementById('palette-buttons');
            palContainer.innerHTML = '';
            COLOR_PALETTES[state.theme].forEach((pal, idx) => {
                const btn = document.createElement('button');
                btn.className = `group flex flex-col items-center gap-1 p-2 rounded-lg border transition-all ${state.paletteIndex === idx ? 'border-blue-500 bg-blue-50' : 'border-transparent hover:bg-gray-100'}`;
                btn.innerHTML = `
                    <div class="flex overflow-hidden rounded-full border border-gray-200 w-10 h-10 shadow-sm pointer-events-none">
                        <div class="h-full w-1/2" style="background-color: ${pal.primary}"></div>
                        <div class="h-full w-1/2" style="background-color: ${pal.secondary}"></div>
                    </div>
                    <span class="text-[10px] ${state.paletteIndex === idx ? 'text-blue-700 font-bold' : 'text-gray-500'}">${pal.name}</span>
                `;
                btn.onclick = () => {
                    state.paletteIndex = idx;
                    initUI();
                    renderPreview();
                };
                palContainer.appendChild(btn);
            });

            buildTextInputs();
            
            // Photo Upload Listener
            document.getElementById('photo-upload').onchange = function(e) {
                if(e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(evt) { addGraphic('image', evt.target.result); }
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
        }

        // --- STREAMING_CHUNK:Building Editor Inputs ---
        let activeStyleField = null;
        function buildTextInputs() {
            const container = document.getElementById('text-inputs-container');
            container.innerHTML = '';
            
            INPUT_FIELDS.forEach(field => {
                const div = document.createElement('div');
                div.className = 'relative';
                
                // Label and Aa button
                let html = `
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-gray-600">${field.label}</label>
                        <button onclick="toggleStylePanel('${field.name}')" class="text-[10px] px-2 py-0.5 rounded transition-colors ${activeStyleField === field.name ? 'bg-blue-100 text-blue-700 font-bold' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">Aa</button>
                    </div>
                `;

                // Style Panel
                if(activeStyleField === field.name) {
                    const curStyle = state.styles[field.name] || {};
                    html += `
                        <div class="flex gap-2 mb-2 p-2 bg-slate-50 rounded-lg border border-slate-200 shadow-inner">
                            <div class="flex-1">
                                <select onchange="updateStyle('${field.name}', 'font', this.value)" class="w-full text-xs p-1.5 rounded border border-gray-300 bg-white">
                                    ${POPULAR_FONTS.map(f => `<option value="${f.value}" ${curStyle.font === f.value ? 'selected' : ''}>${f.label}</option>`).join('')}
                                </select>
                            </div>
                            <div class="w-1/3">
                                <select onchange="updateStyle('${field.name}', 'size', this.value)" class="w-full text-xs p-1.5 rounded border border-gray-300 bg-white">
                                    ${FONT_SIZES.map(s => `<option value="${s.value}" ${curStyle.size === s.value || (!curStyle.size && s.value === '1em') ? 'selected' : ''}>${s.label}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    `;
                }

                // Input Box
                if (field.name === 'title') {
                    html += `
                        <div class="relative flex items-center">
                            <input type="text" readonly class="w-full p-2 text-base bg-gray-100 border border-gray-200 rounded-lg text-gray-500 cursor-not-allowed outline-none pr-16" value="${state.content[field.name]}">
                            <span class="absolute right-2 text-[10px] bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Locked</span>
                        </div>
                    `;
                } else if(field.type === 'textarea') {
                    html += `<textarea rows="2" class="w-full p-2 text-base bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none" oninput="updateContent('${field.name}', this.value)">${state.content[field.name]}</textarea>`;
                } else {
                    html += `<input type="text" class="w-full p-2 text-base bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="${state.content[field.name]}" oninput="updateContent('${field.name}', this.value)">`;
                }
                
                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        function toggleStylePanel(fieldName) {
            activeStyleField = activeStyleField === fieldName ? null : fieldName;
            buildTextInputs();
        }

        function updateStyle(fieldName, prop, val) {
            if(!state.styles[fieldName]) state.styles[fieldName] = {};
            state.styles[fieldName][prop] = val;
            renderPreview();
        }

        function updateContent(fieldName, val) {
            state.content[fieldName] = val;
            renderPreview();
        }

        // --- STREAMING_CHUNK:Mobile Viewport Scaling ---
        function adjustScale() {
            const previewArea = document.getElementById('preview-area');
            const scaleWrapper = document.getElementById('scale-wrapper');
            if(!previewArea || !scaleWrapper) return;
            
            const availableWidth = previewArea.clientWidth - 32;
            const availableHeight = previewArea.clientHeight - 60;
            
            const scaleWidth = availableWidth / 500;
            const scaleHeight = availableHeight / 700;
            
            let scale = Math.min(scaleWidth, scaleHeight);
            if (scale > 1.2) scale = 1.2; 
            
            scaleWrapper.style.transform = `scale(${scale})`;
        }

        // --- STREAMING_CHUNK:Safe iOS Download Logic ---
        document.getElementById('download-btn').addEventListener('click', async () => {
            const btn = document.getElementById('download-btn');
            const cardElement = document.getElementById('invitation-card-capture');
            const currentPalette = COLOR_PALETTES[state.theme][state.paletteIndex];
            
            btn.disabled = true;
            btn.classList.add('bg-blue-400', 'cursor-wait');
            btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            document.getElementById('icon-download').classList.add('hidden');
            document.getElementById('icon-loading').classList.remove('hidden');
            document.getElementById('download-text').innerText = "Generating...";

            try {
                // Ensure emojis and graphics are positioned perfectly before capture
                const wrapper = document.getElementById('scale-wrapper');
                const oldTransform = wrapper.style.transform;
                
                const canvas = await html2canvas(cardElement, {
                    scale: 3, // 1500x2100 Output
                    useCORS: true,
                    backgroundColor: currentPalette.bg,
                    logging: false,
                    width: 500,
                    height: 700,
                    scrollY: -window.scrollY,
                    scrollX: -window.scrollX,
                    onclone: (clonedDoc) => {
                        // Negate CSS transform during clone to prevent scaling offset bugs
                        const clonedWrapper = clonedDoc.getElementById('scale-wrapper');
                        if(clonedWrapper) clonedWrapper.style.transform = 'scale(1)';
                    }
                });

                // iOS Safe Download (Blob instead of Base64)
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `${state.theme.replace(/\s+/g, '-')}-Invitation.png`;
                    link.href = url;
                    link.click();
                    setTimeout(() => URL.revokeObjectURL(url), 100); // Cleanup memory
                }, 'image/png');

            } catch (error) {
                console.error("Export failed:", error);
            } finally {
                btn.disabled = false;
                btn.classList.remove('bg-blue-400', 'cursor-wait');
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('icon-download').classList.remove('hidden');
                document.getElementById('icon-loading').classList.add('hidden');
                document.getElementById('download-text').innerText = "Download Design";
            }
        });

        // --- STREAMING_CHUNK:Boot Sequence ---
        window.addEventListener('resize', adjustScale);
        window.onload = () => {
            initUI();
            renderPreview();
            adjustScale();
            // Trigger scale again to guarantee layout after fonts load
            setTimeout(adjustScale, 500); 
        };
    </script>
</body>
</html>
